	<script>
		function escapeHtml(str) {
		  return str
			.replace(/&/g, '&amp;')
			.replace(/</g, '&lt;')
			.replace(/>/g, '&gt;')
			.replace(/"/g, '&quot;')
			.replace(/'/g, '&#39;')
			.replace(/`/g, '&#x60;');
		}

		const listPanel = document.getElementById('listPanel');
		const messagePanel = document.getElementById('messagePanel');
		const messageList = document.getElementById('messageList');

		const removeBtn = document.getElementById('removeBtn');
		const checkBtn = document.getElementById('checkBtn');
		const backBtn = document.getElementById('backBtn');
		const msgFrom = document.getElementById('msgFrom');
		const msgTo = document.getElementById('msgTo');
		const msgSubject = document.getElementById('msgSubject');
		const msgContent = document.getElementById('msgContent');
		const msgTime = document.getElementById('msgTime');

		let messages = [];
		let currentMessageId = null;

		async function loadMessageList() {
			try {
				const res = await fetch('/api/get-list-new.php?m=iv05igt6zr');
				messages = await res.json();

				messageList.innerHTML = '';
				messages.forEach(message => {
					const li = document.createElement('li');
					li.className = 'list-group-item list-group-item-action mb-1';
					if (message.is_readed == '0') {
						li.className += ' border-0 border-start border-primary border-5';
					}
					li.innerHTML = [
						'<div style="border-bottom: 1px solid #ccc">' + escapeHtml(message.to) + '</div>'
						+
						escapeHtml(message.from),
						escapeHtml(message.subject).substr(0,30),
						message.created_at,
					].join('<br>')
					li.style.cursor = 'pointer';
					li.style.maxWidth = '100%';
					li.addEventListener('click', () => openMessage(message.id));
					messageList.appendChild(li);
				});
			} catch {
				messageList.innerHTML = '<li class="list-group-item text-danger">Ошибка загрузки списка</li>';
			}
		}

		async function openMessage(id) {
			if (currentMessageId === id) return;
			currentMessageId = id;

			[...messageList.children].forEach(li => {
				li.classList.toggle('active', li.textContent === id);
			});
			
			msgFrom.textContent = '';
			msgTo.textContent = '';
			msgSubject.textContent = '';

			try {
				const res = await fetch(`/api/get-one-new.php?m=iv05igt6zr&i=${encodeURIComponent(id)}`);
				const msg = await res.json();

				msgFrom.textContent = msg.from;
				msgTo.textContent = msg.to;
				msgSubject.textContent = msg.subject;
				msgContent.innerHTML = msg.content;
				msgTime.textContent = msg.created_at;

				if (window.innerWidth < 768) {
					listPanel.classList.add('d-none');
					messagePanel.classList.remove('d-none');
				}
			} catch {
				msgFrom.textContent = '';
				msgSubject.textContent = '';
				msgContent.innerHTML = '<p class="text-danger">Ошибка загрузки сообщения</p>';
			}
		}

		removeBtn.addEventListener('click', async () => {
			messagePanel.classList.add('d-none');
			listPanel.classList.remove('d-none');

			msgFrom.textContent = '';
			msgTo.textContent = '';
			msgSubject.textContent = '';
			msgContent.innerHTML = '';
			msgTime.textContent = '';

			await fetch(`/api/remove-one-new.php?m=iv05igt6zr&i=${encodeURIComponent(currentMessageId)}`, { method: 'POST' });

			currentMessageId = null;

			await loadMessageList()

			if (messages.length) {
				openMessage(messages[0].id)
			}
		})

		checkBtn.addEventListener('click', async () => {
			messagePanel.classList.add('d-none');
			listPanel.classList.remove('d-none');

			msgFrom.textContent = '';
			msgTo.textContent = '';
			msgSubject.textContent = '';
			msgContent.innerHTML = '';
			msgTime.textContent = '';

			await fetch(`/api/check-one-new.php?m=iv05igt6zr&i=${encodeURIComponent(currentMessageId)}`, { method: 'POST' });

			currentMessageId = null;

			await loadMessageList()

			if (messages.length) {
				openMessage(messages[0].id)
			}
		})

		backBtn.addEventListener('click', () => {
			messagePanel.classList.add('d-none');
			listPanel.classList.remove('d-none');
			currentMessageId = null;
			msgFrom.textContent = '';
			msgSubject.textContent = '';
			msgContent.innerHTML = '';
			msgTime.textContent = '';
			[...messageList.children].forEach(li => li.classList.remove('active'));
		});

		window.addEventListener('resize', () => {
			if (window.innerWidth >= 768) {
				listPanel.classList.remove('d-none');
				messagePanel.classList.remove('d-none');
			} else {
				if (!currentMessageId) {
					listPanel.classList.remove('d-none');
					messagePanel.classList.add('d-none');
				}
			}
		});

		window.addEventListener('load', async () => {
			await loadMessageList();
		});

		const refreshBtn = document.getElementById('refresh');
		refreshBtn.addEventListener('click', () => loadMessageList());

		setInterval(() => loadMessageList(), 60 * 1000)

		function copyToClipboard(domain) {
			const text = `8eo.cak-1qfq4s@` + domain;
			navigator.clipboard.writeText(text).then(() => {
			  alert("Скопировано!");
			}).catch(err => {
			  console.error("Ошибка копирования:", err);
			});
		}
	</script>
